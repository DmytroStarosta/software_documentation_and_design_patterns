<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajax | Edit {{ device.name }}</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #E0E0E0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .edit-container {
            background-color: #1E1E1E;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            color: #FFFFFF;
            font-weight: 300;
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #AAAAAA;
            font-size: 0.9em;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            background-color: #2C2C2C;
            border: 1px solid #333;
            border-radius: 4px;
            color: #FFFFFF;
            box-sizing: border-box;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #BB86FC;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-save {
            background-color: #BB86FC;
            color: #000000;
        }

        .btn-save:hover {
            background-color: #9A67EA;
        }

        .btn-cancel {
            background-color: transparent;
            border: 1px solid #555;
            color: #AAAAAA;
        }

        .btn-cancel:hover {
            background-color: #2C2C2C;
            border-color: #777;
            color: #FFFFFF;
        }
    </style>
</head>
<body>

    <div class="edit-container">
        <h1>Device Settings</h1>
        <form action="/edit/{{ device.id }}" method="POST">
            <div class="form-group">
                <label>Device Name</label>
                <input type="text" name="name" value="{{ device.name }}" required>
            </div>
            <div class="form-group">
                <label>MAC Address</label>
                <input type="text" name="mac_address" value="{{ device.mac_address }}" required>
            </div>
            <div class="form-group">
                <label>Location</label>
                <input type="text" name="location" value="{{ device.location }}" required>
            </div>
            <div class="btn-group">
                <button type="submit" class="btn btn-save">UPDATE SETTINGS</button>
                <a href="/" class="btn btn-cancel">CANCEL</a>
            </div>
        </form>
    </div>

</body>
</html>
